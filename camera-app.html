<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lite Cam — under 100KB</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0a0b0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lite Cam">
<style>
  :root{
    --bg:#0a0b0d;
    --panel:#141519;
    --line:#242630;
    --text:#eef0f3;
    --dim:#8b90a0;
    --accent:#ff5a36;
    --accent-dim:#7a2c1b;
    --ok:#4fd67a;
    --mono: 'SF Mono', 'Roboto Mono', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:var(--sans); overflow:hidden; overscroll-behavior:none;
  }
  #app{
    position:fixed; inset:0; display:flex; flex-direction:column;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
  }

  /* ---------- top bar ---------- */
  #topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 10px;
    z-index:5;
  }
  .brand{
    font-family:var(--mono); font-size:13px; letter-spacing:.08em; color:var(--dim);
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);}
  #limitBadge{
    font-family:var(--mono); font-size:12px; color:var(--dim);
    border:1px solid var(--line); border-radius:20px; padding:5px 11px;
    background:rgba(255,255,255,.02);
  }
  #limitBadge b{color:var(--text); font-weight:600;}

  /* ---------- viewfinder ---------- */
  #stage{
    position:relative; flex:1; margin:0 10px; border-radius:18px; overflow:hidden;
    background:#000; border:1px solid var(--line);
  }
  video, #shotCanvas{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  #shotCanvas{display:none; background:#000;}
  #shotImg{
    position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    background:#000; display:none;
  }
  #hint{
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    font-family:var(--mono); font-size:11px; color:var(--dim);
    background:rgba(0,0,0,.4); padding:6px 12px; border-radius:20px;
    border:1px solid var(--line); text-align:center; max-width:85%;
  }
  #flash{
    position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;
  }

  #resultPanel{
    position:absolute; left:12px; right:12px; bottom:12px;
    background:rgba(10,11,13,.86); backdrop-filter:blur(10px);
    border:1px solid var(--line); border-radius:14px; padding:12px 14px;
    display:none; font-family:var(--mono); font-size:12px;
  }
  #resultPanel .row{display:flex; justify-content:space-between; margin-bottom:3px; color:var(--dim);}
  #resultPanel .row b{color:var(--ok);}
  #resultPanel .row.over b{color:#ff5a5a;}

  /* ---------- filmstrip ---------- */
  #filmstrip{
    display:flex; gap:8px; padding:10px 16px; overflow-x:auto;
    scrollbar-width:none; min-height:56px;
  }
  #filmstrip::-webkit-scrollbar{display:none;}
  .thumb{
    flex:0 0 auto; width:44px; height:44px; border-radius:9px; overflow:hidden;
    border:1px solid var(--line); position:relative; background:#000;
  }
  .thumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .thumb .kb{
    position:absolute; bottom:0; left:0; right:0; font-family:var(--mono);
    font-size:8px; text-align:center; background:rgba(0,0,0,.65); color:var(--ok);
    padding:1px 0;
  }
  #filmstrip .empty{
    font-family:var(--mono); font-size:11px; color:#3d4049; align-self:center; padding-left:4px;
  }

  /* ---------- controls ---------- */
  #controls{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 28px 22px;
  }
  .ctrlBtn{
    width:50px; height:50px; border-radius:50%; border:1px solid var(--line);
    background:var(--panel); color:var(--text); display:flex; align-items:center;
    justify-content:center; font-size:20px;
  }
  #shutter{
    width:76px; height:76px; border-radius:50%; border:4px solid var(--text);
    background:transparent; position:relative; display:flex; align-items:center; justify-content:center;
  }
  #shutter::after{
    content:''; width:60px; height:60px; border-radius:50%; background:var(--accent);
    transition:transform .12s ease;
  }
  #shutter:active::after{transform:scale(.86);}
  #shutter.retake::after{background:var(--dim);}

  .actionRow{display:none; gap:12px; width:100%;}
  .actionBtn{
    flex:1; padding:14px 0; border-radius:14px; border:1px solid var(--line);
    font-family:var(--sans); font-size:15px; font-weight:600; text-align:center;
    background:var(--panel); color:var(--text);
  }
  .actionBtn.primary{background:var(--accent); border-color:var(--accent); color:#100603;}

  #err{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:10px; text-align:center; padding:30px; z-index:20;
    background:var(--bg);
  }
  #err h2{font-size:17px; margin:0;}
  #err p{color:var(--dim); font-size:13px; line-height:1.5; margin:0; font-family:var(--mono);}
  #err button{margin-top:6px; padding:10px 22px; border-radius:10px; border:1px solid var(--accent); background:var(--accent); color:#100603; font-weight:600;}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="brand"><span class="dot"></span>LITE CAM</div>
    <div id="limitBadge">limit <b>100KB</b></div>
  </div>

  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="shotCanvas"></canvas>
    <img id="shotImg" alt="captured photo">
    <div id="hint">tap the shutter to capture — auto-compresses to fit</div>
    <div id="flash"></div>
    <div id="resultPanel"></div>
  </div>

  <div id="filmstrip"><div class="empty">no shots yet — captured photos land here</div></div>

  <div id="controls">
    <button class="ctrlBtn" id="switchCam" title="switch camera">⟲</button>

    <div id="shutterWrap">
      <button id="shutter" title="capture"></button>
    </div>

    <div class="actionRow" id="actionRow">
      <div class="actionBtn" id="retakeBtn">Retake</div>
      <div class="actionBtn primary" id="saveBtn">Save</div>
    </div>

    <button class="ctrlBtn" id="dlAll" title="download all">⇩</button>
  </div>

  <div id="err">
    <h2>Camera unavailable</h2>
    <p id="errMsg">Waiting for permission…</p>
    <button id="retryBtn">Try again</button>
  </div>

</div>

<script>
(function(){
  const MAX_BYTES = 100 * 1024; // hard limit
  const video = document.getElementById('video');
  const shotCanvas = document.getElementById('shotCanvas');
  const shotImg = document.getElementById('shotImg');
  const shutter = document.getElementById('shutter');
  const switchCamBtn = document.getElementById('switchCam');
  const dlAllBtn = document.getElementById('dlAll');
  const filmstrip = document.getElementById('filmstrip');
  const resultPanel = document.getElementById('resultPanel');
  const hint = document.getElementById('hint');
  const flash = document.getElementById('flash');
  const actionRow = document.getElementById('actionRow');
  const retakeBtn = document.getElementById('retakeBtn');
  const saveBtn = document.getElementById('saveBtn');
  const errBox = document.getElementById('err');
  const errMsg = document.getElementById('errMsg');
  const retryBtn = document.getElementById('retryBtn');

  let stream = null;
  let facingMode = 'environment';
  let currentBlob = null;
  let currentBytes = 0;
  let currentQuality = 0;
  let currentDims = {w:0,h:0};
  let shots = []; // {url, bytes, ts}
  let mode = 'live'; // 'live' | 'preview'

  async function startCamera(){
    errBox.style.display = 'none';
    stopCamera();
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:facingMode}, width:{ideal:1280}, height:{ideal:1280} },
        audio:false
      });
      video.srcObject = stream;
    }catch(e){
      showError(e);
    }
  }

  function stopCamera(){
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  }

  function showError(e){
    let msg = 'Could not access the camera. ';
    if(location.protocol !== 'https:' && location.hostname !== 'localhost'){
      msg += 'This page must be opened over HTTPS (or as a local file your browser trusts) for camera access to work.';
    } else if(e && e.name === 'NotAllowedError'){
      msg += 'Permission was denied — allow camera access in your browser settings and retry.';
    } else if(e && e.name === 'NotFoundError'){
      msg += 'No camera was found on this device.';
    } else {
      msg += (e && e.message) ? e.message : 'Unknown error.';
    }
    errMsg.textContent = msg;
    errBox.style.display = 'flex';
  }

  switchCamBtn.addEventListener('click', ()=>{
    facingMode = (facingMode === 'environment') ? 'user' : 'environment';
    startCamera();
  });
  retryBtn.addEventListener('click', startCamera);

  // ---------- capture + compress ----------
  function flashScreen(){
    flash.style.transition = 'none';
    flash.style.opacity = '0.85';
    requestAnimationFrame(()=>{
      flash.style.transition = 'opacity .25s ease';
      flash.style.opacity = '0';
    });
  }

  async function canvasToBlob(canvas, quality){
    return new Promise(res=> canvas.toBlob(b=>res(b), 'image/jpeg', quality));
  }

  // Draw the current video frame at a given max dimension, return canvas
  function drawFrame(maxDim){
    const vw = video.videoWidth, vh = video.videoHeight;
    let w = vw, h = vh;
    if(Math.max(w,h) > maxDim){
      const scale = maxDim / Math.max(w,h);
      w = Math.round(w*scale); h = Math.round(h*scale);
    }
    shotCanvas.width = w; shotCanvas.height = h;
    const ctx = shotCanvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);
    return {w,h};
  }

  async function compressUnderLimit(){
    // Try progressively smaller max-dimensions, and within each, binary-search JPEG quality.
    const dimSteps = [1280, 1024, 800, 640, 480, 360, 260];
    for(const dim of dimSteps){
      const {w,h} = drawFrame(dim);
      let lo = 0.05, hi = 0.92, best = null, bestQ = 0;
      // 7 iterations of binary search is plenty of precision
      for(let i=0; i<7; i++){
        const mid = (lo+hi)/2;
        const blob = await canvasToBlob(shotCanvas, mid);
        if(blob.size <= MAX_BYTES){
          best = blob; bestQ = mid;
          lo = mid; // try higher quality still under limit
        } else {
          hi = mid;
        }
      }
      if(best){
        return {blob:best, quality:bestQ, w, h};
      }
      // even lowest quality at this dim didn't fit -> shrink further
    }
    // last resort: smallest dim, lowest quality, whatever we get
    const {w,h} = drawFrame(220);
    const blob = await canvasToBlob(shotCanvas, 0.05);
    return {blob, quality:0.05, w, h};
  }

  shutter.addEventListener('click', async ()=>{
    if(mode === 'preview'){ return; }
    if(!video.videoWidth){ return; }
    flashScreen();
    hint.textContent = 'compressing…';
    shutter.disabled = true;

    const result = await compressUnderLimit();
    currentBlob = result.blob;
    currentBytes = result.blob.size;
    currentQuality = result.quality;
    currentDims = {w:result.w, h:result.h};

    const url = URL.createObjectURL(currentBlob);
    shotImg.src = url;
    enterPreview();
    renderResult();

    shutter.disabled = false;
  });

  function enterPreview(){
    mode = 'preview';
    video.style.display = 'none';
    shotImg.style.display = 'block';
    hint.style.display = 'none';
    resultPanel.style.display = 'block';
    document.getElementById('shutterWrap').style.display = 'none';
    actionRow.style.display = 'flex';
  }

  function exitPreview(){
    mode = 'live';
    video.style.display = 'block';
    shotImg.style.display = 'none';
    hint.style.display = 'block';
    hint.textContent = 'tap the shutter to capture — auto-compresses to fit';
    resultPanel.style.display = 'none';
    document.getElementById('shutterWrap').style.display = 'block';
    actionRow.style.display = 'none';
  }

  function renderResult(){
    const kb = (currentBytes/1024).toFixed(1);
    const over = currentBytes > MAX_BYTES;
    resultPanel.innerHTML = `
      <div class="row ${over?'over':''}"><span>size</span><b>${kb} KB</b></div>
      <div class="row"><span>quality</span><b>${Math.round(currentQuality*100)}%</b></div>
      <div class="row"><span>dimensions</span><b>${currentDims.w}×${currentDims.h}</b></div>
    `;
  }

  retakeBtn.addEventListener('click', ()=>{
    if(shotImg.src) URL.revokeObjectURL(shotImg.src);
    currentBlob = null;
    exitPreview();
  });

  function filenameFor(ts){
    const d = new Date(ts);
    const p = n=>String(n).padStart(2,'0');
    return `photo_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.jpg`;
  }

  function downloadBlob(blob, name){
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }

  saveBtn.addEventListener('click', ()=>{
    if(!currentBlob) return;
    const ts = Date.now();
    const url = URL.createObjectURL(currentBlob);
    shots.push({url, bytes:currentBytes, ts, blob:currentBlob});
    renderFilmstrip();
    downloadBlob(currentBlob, filenameFor(ts));
    currentBlob = null;
    exitPreview();
  });

  function renderFilmstrip(){
    if(shots.length === 0){
      filmstrip.innerHTML = '<div class="empty">no shots yet — captured photos land here</div>';
      return;
    }
    filmstrip.innerHTML = '';
    shots.slice().reverse().forEach(s=>{
      const d = document.createElement('div');
      d.className = 'thumb';
      d.innerHTML = `<img src="${s.url}"><div class="kb">${(s.bytes/1024).toFixed(0)}KB</div>`;
      d.addEventListener('click', ()=> downloadBlob(s.blob, filenameFor(s.ts)));
      filmstrip.appendChild(d);
    });
  }

  dlAllBtn.addEventListener('click', ()=>{
    if(shots.length === 0) return;
    shots.forEach((s,i)=> setTimeout(()=>downloadBlob(s.blob, filenameFor(s.ts)), i*200));
  });

  startCamera();

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
